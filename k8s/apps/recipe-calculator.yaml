apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: recipe-calculator
spec:
  project: default
  source:
    repoURL: https://github.com/dancavallaro/recipe-calculator
    targetRevision: v0.1.0
    path: deploy
  destination:
    namespace: recipe-calculator
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
