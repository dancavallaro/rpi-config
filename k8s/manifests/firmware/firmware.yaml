apiVersion: v1
kind: Namespace
metadata:
  name: firmware
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: firmware
  name: firmware-nginx-conf
data:
  default.conf: |
    server {
        listen       8080;
        server_name  _;
        root   /usr/share/nginx/html;
        autoindex on;
        location / {
            try_files $uri $uri/ =404;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: firmware
  name: firmware
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: firmware
  template:
    metadata:
      labels:
        app: firmware
    spec:
      volumes:
        - name: nginx-conf
          configMap:
            name: firmware-nginx-conf
        - name: firmware-data
          nfs:
            server: "10.42.42.12"
            path: /volume1/firmware
            readOnly: true
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: firmware-data
              mountPath: /usr/share/nginx/html
              readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  namespace: firmware
  name: firmware
  annotations:
    "coredns.io/hostname": fw.o.cavnet.cloud
spec:
  type: LoadBalancer
  selector:
    app: firmware
  ports:
    - port: 80
      targetPort: http
