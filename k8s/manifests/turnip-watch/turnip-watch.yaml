apiVersion: v1
kind: Namespace
metadata:
  name: turnip-watch
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pushover-creds
  namespace: turnip-watch
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-parameter-store
  dataFrom:
    - extract:
        # JSON with keys "token" and "user_key"
        key: /talos-prod/pushover-creds-turnip-watch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turnip-watch
  namespace: turnip-watch
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: turnip-watch
  template:
    metadata:
      labels:
        app: turnip-watch
    spec:
      containers:
        - name: turnip-watch
          image: python:3.12-slim
          command: ["python", "/app/watch.py"]
          ports:
            - name: snooze
              containerPort: 8080
          env:
            - name: THRESHOLD
              value: "550"
            - name: PUSHOVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pushover-creds
                  key: token
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: pushover-creds
                  key: user_key
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: turnip-watch-script
---
apiVersion: v1
kind: Service
metadata:
  name: turnip-watch
  namespace: turnip-watch
spec:
  selector:
    app: turnip-watch
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: turnip-watch
  namespace: turnip-watch
spec:
  parentRefs:
    - namespace: default
      name: private-gateway
      sectionName: websecure
  hostnames:
    - turnips.o.cavnet.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: turnip-watch
          port: 80
