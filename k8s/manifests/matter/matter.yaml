apiVersion: v1
kind: Namespace
metadata:
  name: matter
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: matter
  name: matter-data
spec:
  storageClassName: local-path-v2
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  namespace: matter
  name: matter-server
  annotations:
    "coredns.io/hostname": matter.o.cavnet.cloud
spec:
  type: LoadBalancer
  selector:
    app: matter-server
  ports:
    - port: 5580
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: matter
  name: matter-server
spec:
  serviceName: matter-server
  selector:
    matchLabels:
      app: matter-server
  replicas: 1
  revisionHistoryLimit: 0
  template:
    metadata:
      labels:
        app: matter-server
    spec:
      nodeSelector:
        network: dtcnet
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: matter-server
          image: ghcr.io/matter-js/python-matter-server:8.1.2
          volumeMounts:
            - mountPath: /data
              name: matter-data
          ports:
            - containerPort: 5580
      volumes:
        - name: matter-data
          persistentVolumeClaim:
            claimName: matter-data
