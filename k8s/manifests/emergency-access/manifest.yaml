apiVersion: v1
kind: Namespace
metadata:
  name: emergency-access
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: batch/v1
kind: Job
metadata:
  name: talos-read-config
  namespace: emergency-access
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: talos-read-config
    spec:
      restartPolicy: Never
      tolerations:
        - operator: "Exists"
      containers:
        - name: reader
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              set -e
              echo "== /host/system/state/config.yaml =="
              cat /host/system/state/config.yaml
              echo "== done =="
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory