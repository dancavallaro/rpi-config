apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-secrets
helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    namespace: external-secrets
    releaseName: eso
    version: 0.15.0
    includeCRDs: true
    valuesInline:
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::484396241422:role/external-secrets-operator
resources:
  - aws-param-store.yaml
