namespace: iot
groups:
  - name: device-heartbeats
    interval: 1m
    rules:
      - alert: Device Heartbeat Late
        expr: time() - iot_device_last_heartbeat_time{device=~"hatch|starlord|pennyskitchen"} > 300
        annotations:
          message: "Device {{ $labels.device }} hasn't sent a heartbeat in over 5 minutes!"
      - alert: Device Heartbeat Missing
        expr: iot_device_last_heartbeat_time{device=~"hatch|starlord|pennyskitchen"} offset 5m unless on (device) iot_device_last_heartbeat_time{device=~"hatch|starlord|pennyskitchen"}
        annotations:
          message: "Device {{ $labels.device }} heartbeat metric has disappeared"
