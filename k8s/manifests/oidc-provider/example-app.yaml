# EXAMPLE — fully commented so ArgoCD applies nothing from this file.
#
# Template for a workload that assumes an AWS IAM role via web-identity
# federation (DIY IRSA). With the pod-identity-webhook deployed
# (k8s/infra/pod-identity-webhook.yaml), the ENTIRE integration is the role-arn
# annotation on the ServiceAccount: the webhook injects AWS_ROLE_ARN,
# AWS_WEB_IDENTITY_TOKEN_FILE, and a projected sts.amazonaws.com token at
# admission, and the AWS SDK assumes the role and refreshes creds on its own.
# No sidecar, no per-app cert, no env/volume boilerplate.
#
# Prerequisites (see README.md): the Talos issuer patch is applied, oidc-provider
# is serving https://oidc.cavnet.io, the pod-identity-webhook is running, and in
# AWS you've created the IAM OIDC provider + a role whose trust policy pins this
# exact namespace/serviceaccount.
#
# ---
# apiVersion: v1
# kind: ServiceAccount
# metadata:
#   namespace: myapp
#   name: myapp
#   annotations:
#     # The role this pod assumes. Its trust policy must allow
#     # sts:AssumeRoleWithWebIdentity for
#     # oidc.cavnet.io:sub = system:serviceaccount:myapp:myapp
#     eks.amazonaws.com/role-arn: arn:aws:iam::484396241422:role/myapp
# ---
# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   namespace: myapp
#   name: myapp
# spec:
#   replicas: 1
#   selector:
#     matchLabels:
#       app: myapp
#   template:
#     metadata:
#       labels:
#         app: myapp
#     spec:
#       serviceAccountName: myapp   # the webhook injects creds; nothing else needed
#       containers:
#         - name: myapp
#           image: myapp:latest
