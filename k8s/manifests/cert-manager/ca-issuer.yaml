apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: self-signed-issuer
spec:
  selfSigned: {}
---
# When this cert gets rotated, need to update the IAM RA trust anchor config.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: self-signed-issuer-ca
  namespace: cert-manager
spec:
  duration: 8766h # 1 year
  isCA: true
  commonName: self-signed-issuer-ca
  secretName: self-signed-issuer-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: self-signed-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# This is used to issue certificates for use with AWS IAM RA, and is used by the
# Pod Identity Webhook as well.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster-ca-issuer
spec:
  ca:
    secretName: self-signed-issuer-ca
